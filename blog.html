<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing — Dhiaan Dave</title>
<meta name="description" content="Blog posts by Dhiaan Dave — project updates, hackathon experiences, build logs, and thoughts on technology, events, and student life.">
<meta name="author" content="Dhiaan Dave">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Georgia&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.blog-list{display:flex;flex-direction:column;gap:var(--sp-12)}
.blog-item{
  display:block;padding:var(--sp-20) 0;
  border-bottom:1px solid var(--color-graphite);
  transition:opacity .2s ease;
}
.blog-item:last-child{border-bottom:none}
.blog-item:hover{opacity:.8}
.blog-item-title{
  font-family:var(--font-sans);font-size:var(--text-xl);
  font-weight:400;line-height:1.3;
  color:var(--color-white);
  margin-bottom:var(--sp-6);
}
.blog-item-meta{
  font-family:var(--font-mono);font-size:var(--text-xs);
  color:var(--color-graphite);
  text-transform:uppercase;letter-spacing:.05em;
}
</style>
</head>
<body>
<nav class="page-nav">
  <a href="index.html" class="nav-logo">Dhiaan Dave</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<main class="page-main">
  <div style="margin-bottom:var(--sp-48)">
    <span class="label-tag" style="margin-bottom:var(--sp-12);display:block;letter-spacing:.15em">Writing</span>
    <h1 class="page-title">Blog</h1>
    <p class="page-subtitle">Thoughts, experiences, and things I've learned along the way.</p>
  </div>
  <div id="posts-container" class="blog-list">
    <div class="loading-text">Loading posts...</div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>&copy; 2026 Dhiaan Dave</span>
    <div class="footer-links">
      <a href="https://github.com/the-X-alien" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/dhiaan" target="_blank">LinkedIn</a>
    </div>
  </div>
</footer>

<script>
(async function() {
  const container = document.getElementById('posts-container');
  try {
    const res = await fetch('posts.json');
    if (!res.ok) throw new Error('Failed');
    const posts = await res.json();
    if (posts.length === 0) {
      container.innerHTML = '<div class="error-text">No posts yet.</div>';
      return;
    }
    container.innerHTML = posts.map(post => `
      <a href="post.html?id=${encodeURIComponent(post.id)}" class="blog-item">
        <div class="blog-item-title">${post.title}</div>
        <span class="blog-item-meta">${post.date}</span>
      </a>
    `).join('');
  } catch {
    container.innerHTML = '<div class="error-text">Could not load posts.</div>';
  }
})();
</script>
<audio id="bgMusic" src="rocky.mp3" loop preload="auto"></audio>
<script src="bgmusic.js"></script>
</body>
</html>

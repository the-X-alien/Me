<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost — Dhiaan Dave</title>
<meta name="description" content="Page not found — you've found the void. Navigate back to Dhiaan Dave's homepage or explore the sitemap to find what you're looking for.">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@200;300;400;500&family=Georgia&display=swap" rel="stylesheet">
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#000;--white:#fff;--graphite:#4d4d4d;--steel:#808080;--ash:#c6c6c6;--violet:#343755;
  --font-mono:'Space Mono',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-serif:Georgia,'Times New Roman',Times,serif;
}
body{
  background:var(--void);color:var(--white);
  font-family:var(--font-mono);
  overflow:hidden;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}

/* === Glitch 404 === */
.glitch-wrapper{position:relative;margin-bottom:2rem;cursor:pointer}
.glitch{
  font-size:clamp(80px,20vw,180px);font-weight:200;
  font-family:var(--font-sans);letter-spacing:-.05em;
  color:var(--white);position:relative;
  user-select:none;
  text-shadow:
    2px 0 var(--violet),-1px 0 var(--steel);
  animation:glitchPulse 3s ease-in-out infinite;
}
.glitch::before,.glitch::after{
  content:'404';position:absolute;top:0;left:0;width:100%;height:100%;
  opacity:0;
}
.glitch::before{
  color:var(--violet);z-index:-1;
  animation:glitchShift 2s ease-in-out infinite;
  clip-path:inset(20% 0 50% 0);
}
.glitch::after{
  color:var(--steel);z-index:-2;
  animation:glitchShift 2s ease-in-out .3s infinite;
  clip-path:inset(60% 0 10% 0);
}
@keyframes glitchShift{
  0%,90%,100%{transform:translate(0);opacity:0}
  92%{transform:translate(3px,-2px);opacity:.6}
  94%{transform:translate(-4px,3px);opacity:.4}
  96%{transform:translate(2px,-1px);opacity:.5}
}
@keyframes glitchPulse{0%,100%{opacity:1}50%{opacity:.85}}

/* === Subtitle === */
.subtitle{
  font-size:var(--text-sm);color:var(--steel);
  text-transform:uppercase;letter-spacing:.15em;
  margin-bottom:3rem;
  animation:fadeIn .6s ease .3s both;
}
@keyframes fadeIn{to{opacity:1}}
.subtitle{opacity:0}

/* === Maze Game === */
.game-container{
  display:flex;flex-direction:column;align-items:center;gap:1rem;
  opacity:0;animation:fadeIn .6s ease .6s both;
}
#mazeCanvas{
  border:1px solid var(--graphite);
  border-radius:4px;
  background:var(--void);
  display:block;
  max-width:90vw;max-height:50vh;
}
.game-hud{
  display:flex;gap:2rem;
  font-size:var(--text-xs);color:var(--steel);
  text-transform:uppercase;letter-spacing:.08em;
}
.game-hud span{display:flex;align-items:center;gap:.4rem}
.game-hud .val{color:var(--white);font-weight:700}
.controls-hint{
  font-size:10px;color:var(--graphite);
  text-transform:uppercase;letter-spacing:.1em;
  margin-top:.25rem;
}

/* === Home button === */
.home-btn{
  margin-top:2rem;
  font-family:var(--font-mono);font-size:var(--text-sm);
  color:var(--ash);text-transform:uppercase;letter-spacing:.08em;
  background:transparent;
  border:1px solid var(--graphite);border-radius:5px;
  padding:8px 24px;cursor:pointer;
  transition:border-color .2s,color .2s;
  text-decoration:none;display:inline-block;
  opacity:0;animation:fadeIn .6s ease 1s both;
}
.home-btn:hover{border-color:var(--white);color:var(--white)}

/* === Win overlay === */
.win-overlay{
  display:none;flex-direction:column;align-items:center;gap:1.2rem;
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(8px);
  justify-content:center;
  animation:fadeIn .4s ease both;
}
.win-overlay.show{display:flex}
.win-title{
  font-family:var(--font-sans);font-weight:200;
  font-size:clamp(24px,4vw,48px);letter-spacing:-.02em;
}
.win-stats{
  font-size:var(--text-xs);color:var(--steel);
  text-transform:uppercase;letter-spacing:.1em;
}
.win-btn{
  font-family:var(--font-mono);font-size:var(--text-sm);
  text-transform:uppercase;letter-spacing:.08em;
  color:var(--white);
  background:var(--violet);border:1px solid var(--violet);
  border-radius:5px;padding:10px 28px;cursor:pointer;
  text-decoration:none;transition:opacity .2s;
}
.win-btn:hover{opacity:.85}
</style>
</head>
<body>

<div class="glitch-wrapper" id="glitchBtn">
  <div class="glitch">404</div>
</div>
<div class="subtitle">You've found the void. Find your way home.</div>

<div class="game-container">
  <canvas id="mazeCanvas" width="400" height="400"></canvas>
  <div class="game-hud">
    <span>Moves <span class="val" id="moveCount">0</span></span>
    <span>Time <span class="val" id="timeDisplay">0s</span></span>
  </div>
  <div class="controls-hint">← ↑ → ↓ &nbsp;·&nbsp; Find the exit</div>
</div>

<a href="/" class="home-btn">Back Home</a>

<div class="win-overlay" id="winOverlay">
  <div class="win-title">Exit Found</div>
  <div class="win-stats" id="winStats"></div>
  <div style="display:flex;gap:1rem">
    <button class="win-btn" onclick="resetGame()">Play Again</button>
    <a href="/" class="win-btn" style="background:transparent;border-color:var(--graphite)">Go Home</a>
  </div>
</div>

<script>
// === Maze Generator (Recursive Backtracker) ===
const COLS = 15, ROWS = 15;
const CELL_SIZE = 26;
const WALL = 1, PATH = 0;
let maze = [];
let player = { x: 1, y: 1 };
let exit = { x: COLS-2, y: ROWS-2 };
let moves = 0;
let startTime = null;
let timerInterval = null;
let gameWon = false;

function generateMaze() {
  maze = Array.from({length: ROWS}, () => Array(COLS).fill(WALL));
  const stack = [];
  const startX = 1, startY = 1;
  maze[startY][startX] = PATH;
  stack.push({x: startX, y: startY});

  while (stack.length > 0) {
    const {x, y} = stack[stack.length-1];
    const dirs = [];
    if (x > 2 && maze[y][x-2] === WALL) dirs.push({dx: -2, dy: 0, wx: -1, wy: 0});
    if (x < COLS-3 && maze[y][x+2] === WALL) dirs.push({dx: 2, dy: 0, wx: 1, wy: 0});
    if (y > 2 && maze[y-2][x] === WALL) dirs.push({dx: 0, dy: -2, wx: 0, wy: -1});
    if (y < ROWS-3 && maze[y+2][x] === WALL) dirs.push({dx: 0, dy: 2, wx: 0, wy: 1});

    if (dirs.length > 0) {
      const d = dirs[Math.floor(Math.random() * dirs.length)];
      maze[y + d.wy][x + d.wx] = PATH;
      maze[y + d.dy][x + d.dx] = PATH;
      stack.push({x: x + d.dx, y: y + d.dy});
    } else {
      stack.pop();
    }
  }
  maze[exit.y][exit.x] = PATH;
}

let canvas, ctx;
function initCanvas() {
  canvas = document.getElementById('mazeCanvas');
  ctx = canvas.getContext('2d');
  generateMaze();
  drawMaze();
}

function drawMaze() {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  // Draw walls
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (maze[r][c] === WALL) {
        ctx.fillStyle = '#181818';
        ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
      }
    }
  }

  // Draw grid lines (subtle)
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL_SIZE); ctx.lineTo(w, r * CELL_SIZE); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL_SIZE, 0); ctx.lineTo(c * CELL_SIZE, h); ctx.stroke();
  }

  // Draw exit
  ctx.fillStyle = '#343755';
  ctx.fillRect(exit.x * CELL_SIZE + 2, exit.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
  ctx.fillStyle = '#666688';
  ctx.font = '10px Space Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('→', exit.x * CELL_SIZE + CELL_SIZE/2, exit.y * CELL_SIZE + CELL_SIZE/2);

  // Draw player
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(player.x * CELL_SIZE + CELL_SIZE/2, player.y * CELL_SIZE + CELL_SIZE/2, 5, 0, Math.PI * 2);
  ctx.fill();

  // Start marker
  ctx.fillStyle = '#4d4d4d';
  ctx.font = '8px Space Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', 1 * CELL_SIZE + CELL_SIZE/2, 1 * CELL_SIZE + CELL_SIZE/2);
}

function movePlayer(dx, dy) {
  if (gameWon) return;
  const nx = player.x + dx;
  const ny = player.y + dy;
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  if (maze[ny][nx] === WALL) return;

  if (!startTime) {
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 200);
  }

  player.x = nx;
  player.y = ny;
  moves++;
  document.getElementById('moveCount').textContent = moves;
  drawMaze();

  if (player.x === exit.x && player.y === exit.y) {
    gameWon = true;
    clearInterval(timerInterval);
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('winStats').textContent = `Solved in ${moves} moves · ${elapsed}s`;
    document.getElementById('winOverlay').classList.add('show');
  }
}

function updateTimer() {
  if (!startTime) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('timeDisplay').textContent = elapsed + 's';
}

function resetGame() {
  document.getElementById('winOverlay').classList.remove('show');
  player = { x: 1, y: 1 };
  exit = { x: COLS-2, y: ROWS-2 };
  moves = 0;
  gameWon = false;
  startTime = null;
  clearInterval(timerInterval);
  document.getElementById('moveCount').textContent = '0';
  document.getElementById('timeDisplay').textContent = '0s';
  generateMaze();
  drawMaze();
}

// Keyboard controls
document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowUp': e.preventDefault(); movePlayer(0, -1); break;
    case 'ArrowDown': e.preventDefault(); movePlayer(0, 1); break;
    case 'ArrowLeft': e.preventDefault(); movePlayer(-1, 0); break;
    case 'ArrowRight': e.preventDefault(); movePlayer(1, 0); break;
    case 'r': case 'R': resetGame(); break;
  }
});

// Touch swipe
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
});
document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    movePlayer(dx > 0 ? 1 : -1, 0);
  } else {
    movePlayer(0, dy > 0 ? 1 : -1);
  }
});

// Glitch click easter egg
document.getElementById('glitchBtn').addEventListener('click', () => {
  const g = document.querySelector('.glitch');
  g.style.animation = 'none';
  g.offsetHeight;
  g.style.animation = 'glitchPulse 3s ease-in-out infinite';
  g.style.transform = `translate(${(Math.random()-0.5)*10}px,${(Math.random()-0.5)*10}px)`;
  setTimeout(() => g.style.transform = '', 200);
});

initCanvas();
</script>
</body>
</html>

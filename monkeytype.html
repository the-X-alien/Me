<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing — Dhiaan Dave</title>
<meta name="description" content="Dhiaan's Monkeytype typing stats.">
<meta name="author" content="Dhiaan Dave">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.typing-page{min-height:100vh;display:flex;flex-direction:column}
.typing-main{flex:1;padding:var(--sp-96) var(--sp-24) var(--sp-48);max-width:800px;margin:0 auto;width:100%}
@media(max-width:640px){.typing-main{padding:var(--sp-80) var(--sp-16) var(--sp-32)}}
.typing-card{background:var(--color-card);border:1px solid var(--color-graphite);border-radius:var(--radius-sm);padding:var(--sp-20);margin-top:var(--sp-12);text-align:center}
.typing-card iframe{width:100%;height:600px;border:none;border-radius:4px;margin-top:var(--sp-12)}
.stat-row{display:flex;justify-content:center;gap:var(--sp-32);flex-wrap:wrap;margin-top:var(--sp-20)}
.stat-item{text-align:center}
.stat-number{font-family:var(--font-sans);font-size:var(--text-3xl);font-weight:200;color:var(--color-white);line-height:1}
.stat-sub{font-family:var(--font-mono);font-size:10px;color:var(--color-graphite);text-transform:uppercase;letter-spacing:.1em;margin-top:var(--sp-4)}
</style>
</head>
<body class="typing-page">
<nav class="page-nav">
  <a href="index.html" class="nav-logo">Dhiaan Dave</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="blog.html">Writing</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<main class="typing-main">
  <span class="label-tag" style="display:block;margin-bottom:var(--sp-12);letter-spacing:.15em">Monkeytype</span>
  <h1 class="page-title">Typing Stats</h1>
  <p class="page-subtitle">Speed, accuracy, and consistency.</p>

  <div class="typing-card">
    <a href="https://monkeytype.com/profile/Dhiaan_Dave" target="_blank" style="font-family:var(--font-mono);font-size:var(--text-xs);color:var(--color-ash);text-transform:uppercase;letter-spacing:.08em;border:1px solid var(--color-graphite);border-radius:var(--radius-sm);padding:var(--sp-6) var(--sp-14);display:inline-block;transition:border-color .2s">Open on Monkeytype</a>
    <iframe src="https://monkeytype.com/profile/Dhiaan_Dave" loading="lazy" title="Monkeytype Profile"></iframe>
  </div>
</main>

<footer class="site-footer" style="border-top:none">
  <div class="footer-inner">
    <span>⌨️ Data from Monkeytype</span>
    <div class="footer-links">
      <a href="https://github.com/the-X-alien" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/dhiaan" target="_blank">LinkedIn</a>
    </div>
  </div>
</footer>
</body>
</html>
